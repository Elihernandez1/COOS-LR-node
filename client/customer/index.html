<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>COOS-LR | Order</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,400;0,600;1,500&family=Space+Grotesk:wght@500;700&family=Inter:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#161311;
    --paper:#f6f1e9;
    --paper-dim:#c9c2b4;
    --line: rgba(246,241,233,0.14);
    --accent:#e8751a;
    --accent-soft: rgba(232,117,26,0.16);
    --radius: 2px;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    background:var(--ink);
    color:var(--paper);
    font-family:'Inter',sans-serif;
    min-height:100vh;
  }
  a{color:inherit;}
  header{
    padding:28px 24px 20px;
    border-bottom:1px solid var(--line);
    display:flex;
    align-items:baseline;
    justify-content:space-between;
    gap:16px;
    flex-wrap:wrap;
  }
  .brand{display:flex; align-items:baseline; gap:14px;}
  .logo-badge{
    width:44px; height:44px;
    border-radius:50%;
    display:flex; align-items:center; justify-content:center;
    font-family:'Space Grotesk',sans-serif;
    font-weight:700;
    font-size:15px;
    color:#161311;
    background:var(--accent);
    flex-shrink:0;
  }
  h1{
    font-family:'Fraunces',serif;
    font-weight:600;
    font-size:clamp(24px,4vw,34px);
    margin:0;
    letter-spacing:-0.01em;
  }
  .tagline{
    font-size:13px;
    color:var(--paper-dim);
    margin-top:2px;
  }
  .cart-toggle{
    font-family:'Space Grotesk',sans-serif;
    font-size:14px;
    font-weight:700;
    background:transparent;
    color:var(--paper);
    border:1px solid var(--line);
    padding:10px 18px;
    border-radius:100px;
    cursor:pointer;
    display:flex; align-items:center; gap:8px;
  }
  .cart-toggle:hover{border-color:var(--accent);}
  .cart-count{
    background:var(--accent);
    color:#161311;
    border-radius:50%;
    width:20px; height:20px;
    font-size:11px;
    display:flex; align-items:center; justify-content:center;
  }
  main{
    max-width:920px;
    margin:0 auto;
    padding:32px 24px 120px;
  }
  .controls{
    display:flex;
    gap:10px;
    flex-wrap:wrap;
    margin-bottom:28px;
  }
  .cat-btn{
    font-family:'Inter',sans-serif;
    font-size:13px;
    background:transparent;
    color:var(--paper-dim);
    border:1px solid var(--line);
    padding:7px 16px;
    border-radius:100px;
    cursor:pointer;
  }
  .cat-btn.active{
    color:#161311;
    background:var(--accent);
    border-color:var(--accent);
  }
  .search-input{
    flex:1;
    min-width:180px;
    background:transparent;
    border:1px solid var(--line);
    border-radius:100px;
    padding:7px 16px;
    color:var(--paper);
    font-family:'Inter',sans-serif;
    font-size:13px;
  }
  .search-input::placeholder{color:var(--paper-dim);}
  .search-input:focus{outline:none; border-color:var(--accent);}
  .category-label{
    font-family:'Space Grotesk',sans-serif;
    font-size:12px;
    letter-spacing:0.14em;
    text-transform:uppercase;
    color:var(--accent);
    margin:32px 0 14px;
  }
  .category-label:first-of-type{margin-top:0;}
  .item-row{
    display:grid;
    grid-template-columns:1fr auto auto;
    align-items:baseline;
    gap:10px;
    padding:16px 0;
    border-bottom:1px dashed var(--line);
  }
  .item-info{min-width:0;}
  .item-name-line{
    display:flex; align-items:baseline; gap:8px; flex-wrap:wrap;
  }
  .item-name{
    font-family:'Fraunces',serif;
    font-size:18px;
    font-weight:500;
  }
  .badge{
    font-family:'Space Grotesk',sans-serif;
    font-size:10px;
    letter-spacing:0.08em;
    background:var(--accent-soft);
    color:var(--accent);
    padding:2px 8px;
    border-radius:100px;
    text-transform:uppercase;
  }
  .item-desc{
    font-size:13px;
    color:var(--paper-dim);
    margin-top:3px;
    max-width:52ch;
  }
  .item-price{
    font-family:'Space Grotesk',sans-serif;
    font-size:16px;
    font-weight:700;
    white-space:nowrap;
  }
  .add-btn{
    font-family:'Space Grotesk',sans-serif;
    font-size:13px;
    font-weight:700;
    background:var(--accent);
    color:#161311;
    border:none;
    width:34px; height:34px;
    border-radius:50%;
    cursor:pointer;
    flex-shrink:0;
  }
  .add-btn:hover{filter:brightness(1.1);}
  .empty-state{
    text-align:center;
    padding:60px 20px;
    color:var(--paper-dim);
  }
  .cart-overlay{
    position:fixed; inset:0;
    background:rgba(0,0,0,0.5);
    opacity:0; pointer-events:none;
    transition:opacity 0.25s;
    z-index:10;
  }
  .cart-overlay.open{opacity:1; pointer-events:auto;}
  .cart-drawer{
    position:fixed;
    top:0; right:0;
    height:100%;
    width:min(380px, 92vw);
    background:var(--paper);
    color:var(--ink);
    transform:translateX(100%);
    transition:transform 0.3s ease;
    z-index:11;
    display:flex;
    flex-direction:column;
    font-family:'Space Grotesk',sans-serif;
  }
  .cart-drawer.open{transform:translateX(0);}
  .cart-head{
    padding:22px 22px 14px;
    border-bottom:2px dashed rgba(22,19,17,0.2);
    display:flex; justify-content:space-between; align-items:center;
  }
  .cart-head h2{
    font-family:'Fraunces',serif;
    font-size:20px;
    margin:0;
  }
  .close-cart{background:none; border:none; font-size:20px; cursor:pointer; color:var(--ink);}
  .cart-items{flex:1; overflow-y:auto; padding:14px 22px;}
  .cart-line{
    display:flex; justify-content:space-between; align-items:center;
    padding:10px 0;
    border-bottom:1px dotted rgba(22,19,17,0.25);
    font-size:14px;
  }
  .cart-line-name{font-family:'Inter',sans-serif; flex:1;}
  .qty-controls{display:flex; align-items:center; gap:8px; margin:0 10px;}
  .qty-controls button{
    width:22px; height:22px; border-radius:50%; border:1px solid var(--ink);
    background:none; cursor:pointer; font-size:13px; line-height:1;
  }
  .cart-foot{
    padding:18px 22px 24px;
    border-top:2px dashed rgba(22,19,17,0.2);
  }
  .total-row{
    display:flex; justify-content:space-between;
    font-size:20px; font-weight:700;
    margin-bottom:14px;
  }
  .checkout-btn{
    width:100%;
    padding:14px;
    background:var(--ink);
    color:var(--paper);
    border:none;
    border-radius:100px;
    font-family:'Space Grotesk',sans-serif;
    font-weight:700;
    font-size:14px;
    cursor:pointer;
  }
  .checkout-btn:disabled{opacity:0.4; cursor:not-allowed;}
  .sheet-body{padding:22px; overflow-y:auto; flex:1;}
  .field{margin-bottom:16px;}
  .field label{
    display:block; font-family:'Inter',sans-serif; font-size:12px;
    color:rgba(22,19,17,0.6); margin-bottom:6px;
  }
  .field input, .field textarea, .field select{
    width:100%; padding:10px 12px;
    border:1px solid rgba(22,19,17,0.25);
    border-radius:4px;
    font-family:'Inter',sans-serif;
    font-size:14px;
    background:#fff;
  }
  .back-link{
    background:none; border:none; font-family:'Inter',sans-serif;
    font-size:13px; color:rgba(22,19,17,0.6); cursor:pointer; padding:0;
    margin-bottom:14px;
  }
  .confirm-wrap{text-align:center; padding:20px 0;}
  .confirm-wrap .stamp{
    font-family:'Fraunces',serif; font-style:italic; font-size:22px;
    color:var(--accent); margin-bottom:6px;
  }
  .confirm-id{font-size:13px; color:rgba(22,19,17,0.55); margin-bottom:20px;}
  .status-pill{
    display:inline-block; font-family:'Space Grotesk',sans-serif; font-size:12px;
    background:var(--accent-soft); color:#a5540f;
    padding:6px 16px; border-radius:100px; margin-bottom:20px;
  }
  @media (prefers-reduced-motion: reduce){
    .cart-drawer, .cart-overlay{transition:none;}
  }
</style>
</head>
<body>

<header>
  <div class="brand">
    <div class="logo-badge" id="logoBadge">?</div>
    <div>
      <h1 id="tenantName">Loading&hellip;</h1>
      <div class="tagline" id="tenantTagline">Fetching menu</div>
    </div>
  </div>
  <button class="cart-toggle" id="cartToggle">
    Order ticket <span class="cart-count" id="cartCount">0</span>
  </button>
</header>

<main>
  <div class="controls">
    <input class="search-input" id="searchInput" placeholder="Search the menu&hellip;" />
  </div>
  <div id="catBar" class="controls"></div>
  <div id="menuList"></div>
</main>

<div class="cart-overlay" id="cartOverlay"></div>
<div class="cart-drawer" id="cartDrawer">
  <div id="stateCart" style="display:flex; flex-direction:column; height:100%;">
    <div class="cart-head">
      <h2>Your order ticket</h2>
      <button class="close-cart" id="closeCart">&times;</button>
    </div>
    <div class="cart-items" id="cartItems"></div>
    <div class="cart-foot">
      <div class="total-row"><span>Total</span><span id="cartTotal">$0.00</span></div>
      <button class="checkout-btn" id="goToCheckout">Proceed to checkout</button>
    </div>
  </div>

  <div id="stateCheckout" style="display:none; flex-direction:column; height:100%;">
    <div class="cart-head">
      <h2>Checkout</h2>
      <button class="close-cart" id="closeCart2">&times;</button>
    </div>
    <div class="sheet-body">
      <button class="back-link" id="backToCart">&larr; Back to ticket</button>
      <div class="field"><label>Name</label><input id="fName" /></div>
      <div class="field"><label>Phone</label><input id="fPhone" /></div>
      <div class="field"><label>Delivery address</label><input id="fAddress" /></div>
      <div class="field"><label>Notes (optional)</label><textarea id="fNotes" rows="2"></textarea></div>
      <div class="field">
        <label>Payment method</label>
        <select id="fPayment">
          <option>Card on file</option>
          <option>Cash on delivery</option>
        </select>
      </div>
    </div>
    <div class="cart-foot">
      <div class="total-row"><span>Total</span><span id="checkoutTotal">$0.00</span></div>
      <button class="checkout-btn" id="placeOrderBtn">Place order</button>
    </div>
  </div>

  <div id="stateConfirm" style="display:none; flex-direction:column; height:100%;">
    <div class="cart-head">
      <h2>Order placed</h2>
      <button class="close-cart" id="closeCart3">&times;</button>
    </div>
    <div class="sheet-body">
      <div class="confirm-wrap">
        <div class="stamp">Kitchen has it.</div>
        <div class="confirm-id" id="confirmId">Order #—</div>
        <div class="status-pill" id="confirmStatus">Received</div>
        <div id="confirmItems"></div>
      </div>
    </div>
  </div>
</div>

<script>
const params = new URLSearchParams(location.search);
const SUBDOMAIN = params.get('r') || 'pizzeria-luigi';
const API = '/api/customer';

let tenant = null, branding = null, allItems = [], categories = [];
let currentCat = 'All', currentQ = '';
let cart = {};

const el = id => document.getElementById(id);
const money = n => '$' + Number(n).toFixed(2);

function applyBranding(){
  if(!branding) return;
  document.documentElement.style.setProperty('--accent', branding.primary_color || '#e8751a');
  const soft = hexToRgba(branding.primary_color || '#e8751a', 0.16);
  document.documentElement.style.setProperty('--accent-soft', soft);
  el('logoBadge').textContent = branding.logo_text || '??';
}
function hexToRgba(hex, a){
  const c = hex.replace('#','');
  const r = parseInt(c.substring(0,2),16), g = parseInt(c.substring(2,4),16), b = parseInt(c.substring(4,6),16);
  return `rgba(${r},${g},${b},${a})`;
}

async function loadMenu(){
  const url = `${API}/menu/${SUBDOMAIN}?cat=${encodeURIComponent(currentCat)}&q=${encodeURIComponent(currentQ)}`;
  const res = await fetch(url);
  if(!res.ok){
    el('menuList').innerHTML = `<div class="empty-state">Restaurant not found or currently closed.</div>`;
    return;
  }
  const data = await res.json();
  tenant = data.tenant; branding = data.branding; allItems = data.items; categories = data.categories;

  el('tenantName').textContent = tenant.name;
  el('tenantTagline').textContent = tenant.address || '';
  applyBranding();
  renderCategoryBar();
  renderMenu();
}

function renderCategoryBar(){
  const bar = el('catBar');
  bar.innerHTML = '';
  ['All', ...categories].forEach(cat => {
    const b = document.createElement('button');
    b.className = 'cat-btn' + (cat === currentCat ? ' active' : '');
    b.textContent = cat;
    b.onclick = () => { currentCat = cat; loadMenu(); };
    bar.appendChild(b);
  });
}

function renderMenu(){
  const list = el('menuList');
  if(allItems.length === 0){
    list.innerHTML = `<div class="empty-state">Nothing matches that search.</div>`;
    return;
  }
  const grouped = {};
  allItems.forEach(item => {
    if(!grouped[item.category]) grouped[item.category] = [];
    grouped[item.category].push(item);
  });
  list.innerHTML = '';
  Object.keys(grouped).forEach(cat => {
    const label = document.createElement('div');
    label.className = 'category-label';
    label.textContent = cat;
    list.appendChild(label);
    grouped[cat].forEach(item => list.appendChild(renderItemRow(item)));
  });
}

function renderItemRow(item){
  const row = document.createElement('div');
  row.className = 'item-row';
  row.innerHTML = `
    <div class="item-info">
      <div class="item-name-line">
        <span class="item-name">${item.name}</span>
        ${item.badge ? `<span class="badge">${item.badge}</span>` : ''}
      </div>
      ${item.description ? `<div class="item-desc">${item.description}</div>` : ''}
    </div>
    <div class="item-price">${money(item.price)}</div>
    <button class="add-btn" aria-label="Add ${item.name}">+</button>
  `;
  row.querySelector('.add-btn').onclick = () => addToCart(item);
  return row;
}

function addToCart(item){
  const key = String(item.item_id);
  if(cart[key]) cart[key].qty += 1;
  else cart[key] = { item_id: item.item_id, name: item.name, price: Number(item.price), qty: 1 };
  updateCartUI();
}
function changeQty(key, delta){
  cart[key].qty += delta;
  if(cart[key].qty <= 0) delete cart[key];
  updateCartUI();
}

function updateCartUI(){
  const keys = Object.keys(cart);
  const count = keys.reduce((s,k)=>s+cart[k].qty,0);
  const total = keys.reduce((s,k)=>s+cart[k].qty*cart[k].price,0);
  el('cartCount').textContent = count;
  el('cartTotal').textContent = money(total);
  el('checkoutTotal').textContent = money(total);
  el('goToCheckout').disabled = count === 0;

  const itemsEl = el('cartItems');
  if(keys.length === 0){
    itemsEl.innerHTML = `<div class="empty-state">Your ticket is empty. Add something from the menu.</div>`;
    return;
  }
  itemsEl.innerHTML = '';
  keys.forEach(key => {
    const c = cart[key];
    const line = document.createElement('div');
    line.className = 'cart-line';
    line.innerHTML = `
      <span class="cart-line-name">${c.name}</span>
      <div class="qty-controls">
        <button data-d="-1">&minus;</button>
        <span>${c.qty}</span>
        <button data-d="1">+</button>
      </div>
      <span>${money(c.price*c.qty)}</span>
    `;
    line.querySelectorAll('button').forEach(btn=>{
      btn.onclick = () => changeQty(key, parseInt(btn.dataset.d));
    });
    itemsEl.appendChild(line);
  });
}

function openCart(){ el('cartOverlay').classList.add('open'); el('cartDrawer').classList.add('open'); showState('cart'); }
function closeCart(){ el('cartOverlay').classList.remove('open'); el('cartDrawer').classList.remove('open'); }
function showState(name){
  el('stateCart').style.display = name==='cart' ? 'flex' : 'none';
  el('stateCheckout').style.display = name==='checkout' ? 'flex' : 'none';
  el('stateConfirm').style.display = name==='confirm' ? 'flex' : 'none';
}

el('cartToggle').onclick = openCart;
el('cartOverlay').onclick = closeCart;
el('closeCart').onclick = closeCart;
el('closeCart2').onclick = closeCart;
el('closeCart3').onclick = closeCart;
el('goToCheckout').onclick = () => showState('checkout');
el('backToCart').onclick = () => showState('cart');

el('searchInput').addEventListener('input', (e)=>{
  currentQ = e.target.value;
  clearTimeout(window._searchTimer);
  window._searchTimer = setTimeout(loadMenu, 300);
});

el('placeOrderBtn').onclick = async () => {
  const name = el('fName').value.trim();
  const phone = el('fPhone').value.trim();
  const address = el('fAddress').value.trim();
  if(!name || !phone || !address){
    alert('Please fill in name, phone, and delivery address.');
    return;
  }
  const payload = {
    subdomain: SUBDOMAIN,
    name, phone, address,
    notes: el('fNotes').value.trim(),
    payment: el('fPayment').value,
    cart: Object.values(cart)
  };
  el('placeOrderBtn').disabled = true;
  el('placeOrderBtn').textContent = 'Placing order…';
  try{
    const res = await fetch(`${API}/checkout`, {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify(payload)
    });
    const data = await res.json();
    if(!res.ok) throw new Error(data.error || 'Order failed');

    el('confirmId').textContent = `Order #${data.orderId}`;
    el('confirmStatus').textContent = 'Received';
    el('confirmItems').innerHTML = Object.values(cart).map(c =>
      `<div class="cart-line"><span class="cart-line-name">${c.qty}&times; ${c.name}</span><span>${money(c.price*c.qty)}</span></div>`
    ).join('');
    cart = {};
    updateCartUI();
    showState('confirm');
  }catch(err){
    alert(err.message);
  }finally{
    el('placeOrderBtn').disabled = false;
    el('placeOrderBtn').textContent = 'Place order';
  }
};

updateCartUI();
loadMenu();
</script>
</body>
</html>
