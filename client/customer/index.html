<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>COOS-LR | Order</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,400;0,600;1,500&family=Space+Grotesk:wght@500;700&family=Inter:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

<header>
  <div class="brand">
    <div class="logo-badge" id="logoBadge">?</div>
    <div>
      <h1 id="tenantName">Loading&hellip;</h1>
      <div class="tagline" id="tenantTagline">Fetching menu</div>
    </div>
  </div>
  <button class="cart-toggle" id="cartToggle">
    Order ticket <span class="cart-count" id="cartCount">0</span>
  </button>
</header>

<main>
  <div class="controls">
    <input class="search-input" id="searchInput" placeholder="Search the menu&hellip;" />
  </div>
  <div id="catBar" class="controls"></div>
  <div id="menuList"></div>
</main>

<div class="cart-overlay" id="cartOverlay"></div>
<div class="cart-drawer" id="cartDrawer">
  <!-- STATE: cart -->
  <div id="stateCart" style="display:flex; flex-direction:column; height:100%;">
    <div class="cart-head">
      <h2>Your order ticket</h2>
      <button class="close-cart" id="closeCart">&times;</button>
    </div>
    <div class="cart-items" id="cartItems"></div>
    <div class="cart-foot">
      <div class="total-row"><span>Total</span><span id="cartTotal">$0.00</span></div>
      <button class="checkout-btn" id="goToCheckout">Proceed to checkout</button>
    </div>
  </div>

  <!-- STATE: checkout form -->
  <div id="stateCheckout" style="display:none; flex-direction:column; height:100%;">
    <div class="cart-head">
      <h2>Checkout</h2>
      <button class="close-cart" id="closeCart2">&times;</button>
    </div>
    <div class="sheet-body">
      <button class="back-link" id="backToCart">&larr; Back to ticket</button>
      <div class="field"><label>Name</label><input id="fName" /></div>
      <div class="field"><label>Phone</label><input id="fPhone" /></div>
      <div class="field"><label>Delivery address</label><input id="fAddress" /></div>
      <div class="field"><label>Notes (optional)</label><textarea id="fNotes" rows="2"></textarea></div>
      <div class="field">
        <label>Payment method</label>
        <select id="fPayment">
          <option>Card on file</option>
          <option>Cash on delivery</option>
        </select>
      </div>
    </div>
    <div class="cart-foot">
      <div class="total-row"><span>Total</span><span id="checkoutTotal">$0.00</span></div>
      <button class="checkout-btn" id="placeOrderBtn">Place order</button>
    </div>
  </div>

  <!-- STATE: confirmation -->
  <div id="stateConfirm" style="display:none; flex-direction:column; height:100%;">
    <div class="cart-head">
      <h2>Order placed</h2>
      <button class="close-cart" id="closeCart3">&times;</button>
    </div>
    <div class="sheet-body">
      <div class="confirm-wrap">
        <div class="stamp">Kitchen has it.</div>
        <div class="confirm-id" id="confirmId">Order #—</div>
        <div class="status-pill" id="confirmStatus">Received</div>
        <div id="confirmItems"></div>
      </div>
    </div>
  </div>
</div>

<script src="app.js"></script>
</body>
</html>
